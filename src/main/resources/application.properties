spring.application.name=planning
server.port=9090

# PostgreSQL configuration (override via env vars if needed)
spring.datasource.url=${PLANNING_DB_URL:jdbc:postgresql://localhost:5432/planning_db}
spring.datasource.username=${PLANNING_DB_USERNAME:postgres}
spring.datasource.password=${PLANNING_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Help verify that Hibernate schema generation runs at startup (DDL should appear in logs)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG

# Resilience simulation (academic TP): simulate external dependency failure from the service layer
planning.simulate.medecin-service.down=false

# Example format (requested):
# spring.datasource.url=jdbc:postgresql://localhost:5432/<db_name>
# spring.datasource.username=<username>
# spring.datasource.password=<password>
